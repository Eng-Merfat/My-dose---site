<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav>
    <div class="logo">جرعتي</div>
    <div class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="reminders.html">التذكيرات</a>
      <a href="index.html#about">من نحن</a>
    </div>
  </nav>
</header>

<section class="form-container">
  <h2 class="form-title">تسجيل دخول</h2>

  <form>

    <div class="form-group">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" type="email" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" placeholder="********" required>
    </div>

    <button type="submit" class="btn-submit">تسجيل دخول</button>

    <p class="form-footer">
      ليس لديك حساب؟ <a href="#">إنشاء حساب</a>
    </p>

  </form>
</section>

<script>
function togglePassword() {
  var pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
